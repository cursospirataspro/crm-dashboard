<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a0a0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef233c"/>
      <stop offset="100%" stop-color="#b91c2c"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef233c"/>
      <stop offset="100%" stop-color="#ef233c" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo con esquinas redondeadas -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Borde sutil -->
  <rect width="64" height="64" rx="14" fill="none" stroke="rgba(239,35,60,0.35)" stroke-width="1.5"/>

  <!-- Barras de gráfico (chart icon) -->
  <!-- Barra 1 - más baja -->
  <rect x="8" y="38" width="9" height="16" rx="2.5" fill="url(#accent)" opacity="0.5"/>
  <!-- Barra 2 - media -->
  <rect x="20" y="28" width="9" height="26" rx="2.5" fill="url(#accent)" opacity="0.7"/>
  <!-- Barra 3 - alta -->
  <rect x="32" y="18" width="9" height="36" rx="2.5" fill="url(#accent)"/>
  <!-- Barra 4 - media-alta -->
  <rect x="44" y="23" width="9" height="31" rx="2.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Línea de tendencia -->
  <polyline points="12,36 24,26 36,16 48,21" fill="none" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" filter="url(#glow)"/>

  <!-- Puntos en la línea -->
  <circle cx="12" cy="36" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="36" cy="16" r="2.5" fill="#ef233c" filter="url(#glow)"/>
  <circle cx="48" cy="21" r="2" fill="#fff" opacity="0.7"/>

  <!-- Línea base -->
  <line x1="6" y1="54.5" x2="58" y2="54.5" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-linecap="round"/>
</svg>
